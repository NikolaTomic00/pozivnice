    />

      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"

    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.css"
      integrity="sha512-kJlvECunwXftkPwyvHbclArO8wszgBGisiLeuDFwNM8ws+wKIw0sv1os3ClWZOcrEB2eRXULYUsm8OVRGJKwGA=="

      referrerpolicy="no-referrer"
    />

    <!--Iconscout CDN-->
    <link
      rel="stylesheet"
      href="https://unicons.iconscout.com/release/v4.2.0/css/line.css"
    />
    <link rel="stylesheet" href="./css/style.css" />
    <link rel="stylesheet" href="./css/contact.css" />
  </head>
  <body>
    <nav>
      <div class="container nav__container">
        <h1 id="logo">ePozivnice</h1>
        <ul class="nav__menu">
          <li><a href="index.html">Početna</a></li>
          <li><a href="primerpozivnica.html">Modeli</a></li>
          <li><a href="index.html#cenovnik">Cenovnik</a></li>
          <li><a href="index.html#faq">FAQ</a></li>
          <li><a href="contact.html">Kontaktirajte nas</a></li>
        </ul>
        <button id="open-menu-btn"><i class="fa-solid fa-bars"></i></button>
        <button id="close-menu-btn"><i class="fa-solid fa-x"></i></button>
      </div>
    </nav>
    <section class="form-sections">
      <div class="container-form">
        <div class="form-container">
          <h1>Kontaktirajte nas</h1>
          <p>
            Kontaktirajte nas ovde ili putem Instagram DM-a, brzo odgovaramo i
            dogovaramo sve detalje.
          </p>

          <form action="https://formspree.io/f/mjgjdvyq" method="POST">
            <div class="input-group">
              <div class="input-field">
                <i class="fas fa-user"></i>
                <input type="text" name="Ime" placeholder="Ime" required />
              </div>
              <div class="input-field">
                <i class="fas fa-user"></i>
                <input
                  type="text"
                  name="Prezime"
                  placeholder="Prezime"
                  required
                />
              </div>

              <div class="input-field">
                <i class="fas fa-envelope"></i>
                <input type="email" name="Email" placeholder="Email" required />
              </div>

              <div class="input-field">
                <i class="fas fa-phone"></i>
                <input
                  type="tel"
                  name="Telefon"
                  placeholder="Telefon (opciono)"
                />
              </div>
            </div>

            <div class="message-field">
              <i class="fas fa-message"></i>
              <textarea placeholder="Poruka" required></textarea>
            </div>

            <button class="send-msg" type="submit">
              <div class="btn-content">
                <span>Pošalji poruku</span>
                <i class="fas fa-paper-plane"></i>
              </div>
            </button>
          </form>

          <div class="contact-info">
            <div class="info-item">
              <i class="fas fa-map-marker-alt"></i>
              <span>Novi Sad, Srbija</span>
            </div>
            <div class="info-item">
              <i class="fas fa-envelope"></i>
              <span>epozivnice.rs@gmail.com</span>
            </div>

            <div class="info-item">
              <i class="fa-brands fa-instagram"></i>
              <span>epozivnice.rs</span>
            </div>
          </div>
        </div>
      </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="main.js"></script>
  </body>
</html>
